<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d1117">
  <meta name="description" content="FRA Vorfeld Navigator — EDDF Ground Support Equipment Navigation">
  <title>FRA Vorfeld Navigator</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='16' fill='%2300c2e0'/%3E%3Ctext x='50' y='62' text-anchor='middle' font-size='42' font-weight='800' fill='%23000'%3EF%3C/text%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='32' fill='%2300c2e0'/%3E%3Ctext x='90' y='115' text-anchor='middle' font-size='80' font-weight='800' fill='%23000'%3EF%3C/text%3E%3C/svg%3E">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <span class="badge">FRA</span>
        <div>
          <span id="app-title" class="header-title">FRA Vorfeld Navigator</span>
          <span id="app-subtitle" class="header-subtitle">FRAPORT · EDDF</span>
        </div>
      </div>
      <span id="gps-status" class="gps-status gps-off">GPS: Aus</span>
    </header>

    <!-- Map -->
    <div id="map"></div>

    <!-- Search -->
    <div class="search-container">
      <input type="text" id="search-input" placeholder="Position, Gate oder Stand..." autocomplete="off">
      <div id="search-dropdown"></div>
    </div>

    <!-- Route Info -->
    <div id="route-info" class="route-info-panel" style="display:none;"></div>

    <!-- Bottom Controls -->
    <div class="bottom-bar">
      <div class="btn-group">
        <button class="btn btn-primary" onclick="startDemo()" title="Demo GPS">
          <span class="btn-label">DEMO</span>
        </button>
        <button class="btn" onclick="startGPS()" title="GPS">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
          </svg>
        </button>
        <button class="btn" onclick="centerMap()" title="Center">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="12" cy="12" r="3" fill="currentColor"/>
          </svg>
        </button>
      </div>

      <div class="btn-group">
        <button class="btn" onclick="toggleSettings()" title="Settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
        </button>
        <button class="btn" onclick="zoomIn()" title="Zoom In">+</button>
        <button class="btn" onclick="zoomOut()" title="Zoom Out">−</button>
      </div>
    </div>

    <!-- Settings Panel -->
    <div id="settings-backdrop" class="settings-backdrop" onclick="closeSettings()"></div>
    <div id="settings-panel" class="settings-panel">
      <div class="settings-header">
        <h2 id="settings-title">Einstellungen</h2>
        <button class="btn" onclick="closeSettings()" style="width:32px;height:32px;font-size:16px;">✕</button>
      </div>
      <div class="settings-content">
        <div class="setting-row">
          <label id="label-lang">Sprache</label>
          <select onchange="setLanguage(this.value)">
            <option value="de" selected>Deutsch</option>
            <option value="en">English</option>
          </select>
        </div>
        <div class="setting-row">
          <label id="label-basemap">Kartenstil</label>
          <select onchange="setBasemap(this.value)">
            <option value="OSM" selected>OSM Standard</option>
            <option value="Satellite">Satellit</option>
            <option value="Dark">Dunkel</option>
          </select>
        </div>
        <div class="setting-row toggle-row">
          <label id="label-zones">Zonen anzeigen</label>
          <label class="toggle-switch">
            <input type="checkbox" id="check-zones" onchange="toggleZones(this.checked)">
          </label>
        </div>
        <div class="setting-row toggle-row">
          <label id="label-buildings">Gebäude anzeigen</label>
          <label class="toggle-switch">
            <input type="checkbox" id="check-buildings" onchange="toggleBuildings(this.checked)">
          </label>
        </div>
        <div class="setting-row">
          <button id="btn-close-settings" class="btn btn-primary" style="width:100%;height:40px;" onclick="closeSettings()">Schließen</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="road_graph.js"></script>
  <script src="app.js"></script>
</body>
</html>
