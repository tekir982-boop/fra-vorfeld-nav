<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FRA Vorfeld Navigator – Frankfurt Airport</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1a1f2e;--panel-bg:#212738;--text:#e0e0e0;--text-secondary:#9aa0b4;
  --accent:#00b4d8;--accent-glow:#00d4ff;--danger:#e63946;--success:#2ecc71;
  --warning:#f39c12;--border:#2d3344;--input-bg:#181c28;--card-bg:#252a3a;
  --header-bg:#1a1f2e;--hover:#2a3040;--shadow:0 4px 24px rgba(0,0,0,0.4);
}
body.light{
  --bg:#f0f2f5;--panel-bg:#ffffff;--text:#1a1a2e;--text-secondary:#555;
  --accent:#0077b6;--accent-glow:#0096d2;--danger:#c0392b;--success:#27ae60;
  --warning:#d68910;--border:#dde1e7;--input-bg:#f7f8fa;--card-bg:#fff;
  --header-bg:#fff;--hover:#e8ecf1;--shadow:0 2px 16px rgba(0,0,0,0.08);
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;width:100vw}
#app{display:flex;flex-direction:column;height:100vh}
#header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:var(--header-bg);border-bottom:2px solid var(--accent);z-index:1000;flex-shrink:0}
#header .logo{display:flex;align-items:center;gap:10px}
#header .logo svg{width:32px;height:32px;fill:var(--accent)}
#header .title{font-size:1.1rem;font-weight:700;letter-spacing:0.5px}
#header .title span{color:var(--accent)}
#header .status{display:flex;align-items:center;gap:8px;font-size:0.85rem}
#gps-dot{width:10px;height:10px;border-radius:50%;background:var(--danger);transition:background 0.3s}
#gps-dot.active{background:var(--success);box-shadow:0 0 8px var(--success);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
#header .btn{background:var(--accent);color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-weight:600;font-size:0.8rem;transition:all 0.2s}
#header .btn:hover{background:var(--accent-glow);box-shadow:0 0 12px rgba(0,180,216,0.3)}
#header .btn-sm{background:transparent;border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:0.75rem}
#header .btn-sm:hover{background:var(--hover)}
#header .btn-sm.active{background:var(--accent);color:#fff;border-color:var(--accent)}
/* Position ID labels on map */
.pos-label{background:transparent!important;border:none!important}
.pos-label-inner{background:rgba(26,31,46,0.85);color:#fff;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:700;white-space:nowrap;border:1px solid rgba(255,255,255,0.25);pointer-events:none;letter-spacing:0.3px}
body.light .pos-label-inner{background:rgba(255,255,255,0.92);color:#1a1a2e;border-color:rgba(0,0,0,0.15)}
/* Compass arrow on GPS marker */
.gps-arrow{width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:18px solid var(--accent);filter:drop-shadow(0 0 4px var(--accent));transform-origin:center 70%;margin-top:-4px}
#map-container{flex:1;position:relative}
#map{width:100%;height:100%;z-index:1}
/* Leaflet overrides */
.leaflet-control-zoom a{background:var(--panel-bg)!important;color:var(--text)!important;border-color:var(--border)!important}
.leaflet-control-attribution{background:var(--panel-bg)!important;color:var(--text-secondary)!important;font-size:10px!important}
.leaflet-control-attribution a{color:var(--accent)!important}
.leaflet-popup-content-wrapper{background:var(--panel-bg)!important;color:var(--text)!important;border-radius:10px!important;box-shadow:var(--shadow)!important}
.leaflet-popup-tip{background:var(--panel-bg)!important}
.leaflet-popup-close-button{color:var(--text)!important}
/* Side panel */
#side-panel{position:absolute;top:10px;left:10px;z-index:1000;width:340px;max-height:calc(100vh - 150px);display:flex;flex-direction:column;gap:10px;pointer-events:none}
#side-panel>*{pointer-events:auto}
.panel-card{background:var(--panel-bg);border-radius:12px;padding:14px;box-shadow:var(--shadow);border:1px solid var(--border);backdrop-filter:blur(8px)}
.panel-card h3{font-size:0.85rem;font-weight:700;margin-bottom:8px;color:var(--accent);text-transform:uppercase;letter-spacing:1px}
#search-box{width:100%;padding:10px 12px;border:2px solid var(--border);border-radius:8px;background:var(--input-bg);color:var(--text);font-size:0.9rem;outline:none;transition:border 0.2s}
#search-box:focus{border-color:var(--accent)}
#position-list{max-height:220px;overflow-y:auto;margin-top:4px}
#position-list::-webkit-scrollbar{width:5px}
#position-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.position-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:6px;cursor:pointer;transition:all 0.15s;font-size:0.82rem;border:1px solid transparent}
.position-item:hover{background:var(--hover);border-color:var(--accent)}
.position-item.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
.position-item .pos-id{font-weight:700;font-size:0.85rem}
.position-item .pos-desc{font-size:0.72rem;color:var(--text-secondary)}
.position-item.selected .pos-desc{color:rgba(255,255,255,0.7)}
.category-chip{display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.65rem;font-weight:600;margin-left:4px}
.cat-vorfeld-n{background:rgba(0,180,216,0.2);color:var(--accent)}
.cat-vorfeld-s{background:rgba(46,204,113,0.2);color:var(--success)}
.cat-cargo{background:rgba(243,156,18,0.2);color:var(--warning)}
.cat-ga{background:rgba(155,89,182,0.2);color:#9b59b6}
.cat-terminal{background:rgba(231,76,60,0.2);color:var(--danger)}
.cat-landmark{background:rgba(149,165,166,0.2);color:#95a5a6}
/* Route info bar */
#route-info{display:none;align-items:center;gap:12px;padding:10px 14px;background:var(--panel-bg);border-radius:8px;box-shadow:var(--shadow);border:1px solid var(--accent)}
#route-info.visible{display:flex}
#route-info .dist{font-size:1.3rem;font-weight:700;color:var(--accent)}
#route-info .detail{font-size:0.75rem;color:var(--text-secondary)}
#route-info .btn-close{background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:1.1rem;margin-left:auto}
/* Bottom bar */
#bottom-bar{position:absolute;bottom:10px;left:10px;right:10px;z-index:1000;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;pointer-events:none}
#bottom-bar>*{pointer-events:auto}
#coords-display{background:var(--panel-bg);border-radius:8px;padding:6px 14px;font-size:0.75rem;color:var(--text-secondary);border:1px solid var(--border);box-shadow:var(--shadow);text-align:center}
#coords-display .live{color:var(--success);font-weight:600}
/* Mobile adjustments */
@media(max-width:640px){
  #side-panel{width:calc(100vw - 20px);left:10px}
  #header .title{font-size:0.9rem}
  #header .status{font-size:0.7rem}
  #position-list{max-height:140px}
  #header .btn,#header .btn-sm{padding:4px 10px;font-size:0.7rem}
}
/* Leaflet routing line animation */
@keyframes dash{to{stroke-dashoffset:-24}}
.route-line{stroke-dasharray:12 6;animation:dash 1s linear infinite}
/* GPS accuracy circle */
.gps-accuracy{fill:rgba(0,180,216,0.08);stroke:rgba(0,180,216,0.3);stroke-width:2}
.gps-marker-dot{fill:var(--accent);stroke:#fff;stroke-width:3}
/* Toast */
.toast{position:fixed;top:20px;right:20px;z-index:9999;background:var(--panel-bg);color:var(--text);padding:12px 20px;border-radius:8px;box-shadow:var(--shadow);border-left:4px solid var(--accent);font-size:0.85rem;animation:slideIn 0.3s ease}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 22h20L12 2zm0 3.5L18.5 20h-13L12 5.5z"/><circle cx="12" cy="16" r="2.5"/></svg>
      <div class="title">FRA <span>Vorfeld</span> Navigator</div>
    </div>
    <div class="status">
      <div id="gps-dot"></div>
      <span id="gps-status">GPS: Bereit</span>
      <button class="btn" id="btn-center" title="Zum Standort zentrieren">📍 Zentrieren</button>
      <button class="btn-sm" id="btn-demo" title="Demo-Standort am Flughafen setzen">🎬 Demo</button>
      <button class="btn-sm" id="btn-theme" title="Tag/Nacht-Modus">🌓</button>
    </div>
  </div>

  <div id="map-container">
    <div id="map"></div>

    <div id="side-panel">
      <div class="panel-card">
        <h3>🔍 Ziel suchen</h3>
        <input type="text" id="search-box" placeholder="Position eingeben (z.B. V106, S401, Tower)..." autocomplete="off">
        <div id="position-list"></div>
      </div>
      <div id="route-info">
        <span style="font-size:1.5rem">🧭</span>
        <div>
          <div class="dist" id="route-dist">-- m</div>
          <div class="detail" id="route-detail">Kein Ziel ausgewählt</div>
        </div>
        <button class="btn-close" id="btn-clear-route" title="Route löschen">✕</button>
      </div>
    </div>

    <div id="bottom-bar">
      <div id="coords-display">
        📍 <span id="live-coords">GPS wird aktiviert...</span>
      </div>
    </div>
  </div>
</div>

function nearestRoadNode(lat, lng){
  const nodes = window._roadNodes;
  let best=0, bd=Infinity;
  const cos = Math.cos(lat*Math.PI/180);
  for (let i=0;i<nodes.length;i++){
    const dy=(nodes[i][0]-lat)*111320;
    const dx=(nodes[i][1]-lng)*111320*cos;
    const d=dy*dy+dx*dx;
    if (d<bd){ bd=d; best=i; }
  }
  return best;
}

function roadDistM(i,j){
  const a=window._roadNodes[i], b=window._roadNodes[j];
  return haversine(a,b);
}

function astarRoad(startIdx, endIdx){
  if (startIdx===endIdx) return {path:[startIdx], dist:0};
  const adj=window._roadAdj;
  const N=window._roadNodes.length;
  const gScore=new Float64Array(N); gScore.fill(1e18);
  const fScore=new Float64Array(N); fScore.fill(1e18);
  const came=new Int32Array(N); came.fill(-1);
  const closed=new Uint8Array(N);
  // binary heap of [f, idx]
  const heap=[];
  const push=(f,i)=>{ heap.push([f,i]); let c=heap.length-1; while(c>0){ const p=(c-1)>>1; if(heap[p][0]<=heap[c][0]) break; const t=heap[p]; heap[p]=heap[c]; heap[c]=t; c=p; } };
  const pop=()=>{ const top=heap[0]; const last=heap.pop(); if(heap.length){ heap[0]=last; let c=0; for(;;){ let l=c*2+1,r=l+1,s=c; if(l<heap.length&&heap[l][0]<heap[s][0]) s=l; if(r<heap.length&&heap[r][0]<heap[s][0]) s=r; if(s===c) break; const t=heap[c]; heap[c]=heap[s]; heap[s]=t; c=s; } } return top; };

  gScore[startIdx]=0;
  fScore[startIdx]=roadDistM(startIdx,endIdx);
  push(fScore[startIdx], startIdx);
  let openCount=1;
  while(openCount>0 && heap.length){
    const [f,u]=pop(); openCount--;
    if (closed[u]) continue;
    if (u===endIdx){
      const path=[u]; let cur=u;
      while(came[cur]!==-1){ cur=came[cur]; path.push(cur); }
      path.reverse();
      return {path, dist:gScore[u]};
    }
    closed[u]=1;
    const gu=gScore[u];
    const nbrs=adj[u];
    for (let k=0;k<nbrs.length;k++){
      const v=nbrs[k][0], w=nbrs[k][1];
      if (closed[v]) continue;
      const ng=gu+w;
      if (ng < gScore[v]){
        came[v]=u; gScore[v]=ng;
        const ff=ng+roadDistM(v,endIdx);
        fScore[v]=ff; push(ff,v); openCount++;
      }
    }
  }
  return null;
}

function computeRoute(fromLatLng, toLatLng){
  // fromLatLng/toLatLng = [lat,lng]
  const s = nearestRoadNode(fromLatLng[0], fromLatLng[1]);
  const t = nearestRoadNode(toLatLng[0], toLatLng[1]);
  const res = astarRoad(s,t);
  const sn = window._roadNodes[s];
  const tn = window._roadNodes[t];
  const snapFrom = haversine(fromLatLng, sn);
  const snapTo = haversine(toLatLng, tn);
  if (!res){
    // fallback straight
    return {
      latlngs:[fromLatLng, toLatLng],
      dist: haversine(fromLatLng,toLatLng),
      viaRoads:false
    };
  }
  const latlngs = [fromLatLng];
  for (const i of res.path) latlngs.push(window._roadNodes[i]);
  latlngs.push(toLatLng);
  const total = res.dist + snapFrom + snapTo;
  return { latlngs, dist: total, viaRoads:true, roadDist:res.dist };
}

// Custom icon factory
function createIcon(color, isGPS, heading) {
  const size = isGPS ? 18 : 12;
  let html;
  if (isGPS) {
    const rot = (heading != null && !isNaN(heading)) ? heading : 0;
    html = `<div style="display:flex;flex-direction:column;align-items:center;transform:rotate(${rot}deg)">
      <div class="gps-arrow"></div>
      <div style="width:${size}px;height:${size}px;background:${color};border:3px solid #fff;border-radius:50%;box-shadow:0 0 14px ${color},0 0 4px rgba(0,0,0,0.5);margin-top:-6px"></div>
    </div>`;
    return L.divIcon({ html, className:'', iconSize:[28,36], iconAnchor:[14,28] });
  }
  html = `<div style="width:${size}px;height:${size}px;background:${color};border:2px solid #fff;border-radius:3px;transform:rotate(45deg);box-shadow:0 1px 4px rgba(0,0,0,0.4)"></div>`;
  return L.divIcon({ html, className:'', iconSize:[size+6,size+6], iconAnchor:[(size+6)/2,(size+6)/2] });
}

function createLabelIcon(id, color) {
  const w = Math.max(28, id.length * 8 + 10);
  return L.divIcon({
    html: `<div class="pos-label-inner" style="border-color:${color}88;min-width:${w}px;text-align:center">${id}</div>`,
    className: 'pos-label',
    iconSize: [w, 16],
    iconAnchor: [w / 2, -12],
  });
}

// ──────── GPS ────────
let gpsWatchId = null;
let currentPosition = null;
let gpsActive = false;

function startGPS() {
  if (!navigator.geolocation) {
    showToast('❌ GPS wird von diesem Browser nicht unterstützt.', 'error');
    return;
  }
  gpsWatchId = navigator.geolocation.watchPosition(
    onGPSPosition,
    onGPSError,
    {
      enableHighAccuracy: true,
      timeout: 15000,
      maximumAge: 2000,
    }
  );
  updateGPSStatus('aktiv');
}

function onGPSPosition(pos) {
  currentPosition = {
    lat: pos.coords.latitude,
    lng: pos.coords.longitude,
    accuracy: pos.coords.accuracy,
    heading: pos.coords.heading,
    speed: pos.coords.speed,
    timestamp: pos.timestamp,
  };

  if (!gpsActive) {
    gpsActive = true;
    updateGPSStatus('aktiv');
    map.setView([currentPosition.lat, currentPosition.lng], 15);
  }

  updateGPSMarker();
  updateCoordsDisplay();

  if (destinationMarker) {
    drawRoute();
  }

  // Store last known position
  sessionStorage.setItem('fra_last_pos', JSON.stringify({
    lat: currentPosition.lat,
    lng: currentPosition.lng,
    ts: Date.now(),
  }));
}

function onGPSError(err) {
  console.warn('GPS Error:', err.message);
  updateGPSStatus('fehler');
  // Try to restore last known position
  const saved = sessionStorage.getItem('fra_last_pos');
  if (saved) {
    const last = JSON.parse(saved);
    if (Date.now() - last.ts < 300000) { // within 5 min
      currentPosition = { lat: last.lat, lng: last.lng, accuracy: 50 };
      updateGPSMarker();
    }
  }
}

function updateGPSStatus(status) {
  const dot = document.getElementById('gps-dot');
  const txt = document.getElementById('gps-status');
  dot.className = '';
  if (status === 'aktiv') {
    dot.classList.add('active');
    txt.textContent = 'GPS: Live';
    txt.style.color = 'var(--success)';
  } else if (status === 'fehler') {
    txt.textContent = 'GPS: Schwaches Signal';
    txt.style.color = 'var(--warning)';
  } else {
    txt.textContent = 'GPS: Bereit';
    txt.style.color = 'var(--text-secondary)';
  }
}

function updateGPSMarker() {
  if (!currentPosition) return;
  if (gpsMarker) map.removeLayer(gpsMarker);
  if (gpsAccuracyCircle) map.removeLayer(gpsAccuracyCircle);

  gpsAccuracyCircle = L.circle([currentPosition.lat, currentPosition.lng], {
    radius: currentPosition.accuracy || 10,
    className: 'gps-accuracy',
    fillOpacity: 0.5,
  }).addTo(map);

  const heading = currentPosition.heading;
  gpsMarker = L.marker([currentPosition.lat, currentPosition.lng], {
    icon: createIcon('#00b4d8', true, heading),
    zIndexOffset: 1000,
  }).bindPopup(`
    <strong>📍 Ihr Standort</strong><br>
    <small>Genauigkeit: ±${(currentPosition.accuracy||0).toFixed(1)}m</small><br>
    <small>${currentPosition.lat.toFixed(6)}, ${currentPosition.lng.toFixed(6)}</small>
    ${heading != null ? `<br><small>Richtung: ${heading.toFixed(0)}°</small>` : ''}
  `).addTo(map);
}

function updateCoordsDisplay() {
  if (!currentPosition) return;
  document.getElementById('live-coords').innerHTML = `
    <span class="live">● LIVE</span>
    ${currentPosition.lat.toFixed(6)}°, ${currentPosition.lng.toFixed(6)}°
    ${currentPosition.speed != null ? ` | ${(currentPosition.speed*3.6).toFixed(1)} km/h` : ''}
    ${currentPosition.heading != null ? ` | ${currentPosition.heading.toFixed(0)}°` : ''}
  `;
}

// ──────── ROUTE ────────
let selectedTarget = null;

function selectTarget(id) {
  selectedTarget = POSITIONS.find(p => p.id === id);
  if (!selectedTarget) return;

  // Update list selection
  document.querySelectorAll('.position-item').forEach(el => el.classList.remove('selected'));
  const item = document.querySelector(`[data-pos-id="${id}"]`);
  if (item) item.classList.add('selected');

  // Update destination marker
  if (destinationMarker) map.removeLayer(destinationMarker);
  const cat = CAT_ICONS[selectedTarget.cat];
  destinationMarker = L.marker([selectedTarget.lat, selectedTarget.lng], {
    icon: L.divIcon({
      html: `<div style="width:20px;height:20px;background:${cat.color};border:3px solid #fff;border-radius:50%;box-shadow:0 0 16px ${cat.color}"></div>`,
      className:'',
      iconSize:[26,26],
      iconAnchor:[13,13],
    })
  }).bindPopup(`<strong>🎯 Ziel: ${selectedTarget.id}</strong><br>${selectedTarget.desc}`).addTo(map);

  // Show route info
  document.getElementById('route-info').classList.add('visible');

  // Draw
  if (currentPosition) drawRoute();

  // Fit bounds
  if (currentPosition) {
    const bounds = L.latLngBounds(
      [currentPosition.lat, currentPosition.lng],
      [selectedTarget.lat, selectedTarget.lng]
    );
    map.fitBounds(bounds, { padding: [80, 80], maxZoom: 16 });
  } else {
    map.setView([selectedTarget.lat, selectedTarget.lng], 16);
  }

  showToast(`🎯 Ziel gesetzt: <strong>${selectedTarget.id}</strong> – ${selectedTarget.desc}`);
}

function drawRoute() {
  routeLayer.clearLayers();
  if (!currentPosition || !selectedTarget) return;

  const from = [currentPosition.lat, currentPosition.lng];
  const to = [selectedTarget.lat, selectedTarget.lng];
  const route = computeRoute(from, to);
  const dist = route.dist;

  const line = L.polyline(route.latlngs, {
    color: '#00b4d8',
    weight: 5,
    opacity: 0.9,
    lineJoin: 'round',
    lineCap: 'round',
  }).addTo(routeLayer);

  // Light dashed overlay for animation feel
  L.polyline(route.latlngs, {
    color: '#ffffff',
    weight: 1.5,
    opacity: 0.45,
    dashArray: '10 14',
    className: 'route-line',
  }).addTo(routeLayer);

  // Mid label
  const mid = route.latlngs[Math.floor(route.latlngs.length/2)];
  L.marker(mid, {
    icon: L.divIcon({
      html: `<div style="background:var(--panel-bg);color:var(--accent);padding:3px 8px;border-radius:6px;font-weight:700;font-size:0.8rem;white-space:nowrap;border:1px solid var(--accent);box-shadow:var(--shadow)">${formatDistance(dist)}${route.viaRoads?' · Vorfeldweg':''}</div>`,
      className:'',
      iconAnchor:[50,10],
    })
  }).addTo(routeLayer);

  document.getElementById('route-dist').textContent = formatDistance(dist);
  const bearing = getBearing(from, to);
  const mode = route.viaRoads ? 'Über Vorfeld-Servicewege' : 'Direkte Linie (Netz nicht erreichbar)';
  document.getElementById('route-detail').innerHTML = `
    Ziel: <strong>${selectedTarget.id}</strong> (${selectedTarget.desc})<br>
    ${mode} · Peilung ${bearing.toFixed(0)}°
  `;
}

function haversine(a, b) {
  const R = 6371000;
  const dLat = (b[0] - a[0]) * Math.PI / 180;
  const dLng = (b[1] - a[1]) * Math.PI / 180;
  const sinDlat = Math.sin(dLat/2), sinDlng = Math.sin(dLng/2);
  const h = sinDlat*sinDlat + Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*sinDlng*sinDlng;
  return 2 * R * Math.atan2(Math.sqrt(h), Math.sqrt(1-h));
}

function formatDistance(m) {
  if (m < 1000) return `${Math.round(m)} m`;
  return `${(m/1000).toFixed(2)} km`;
}

function getBearing(a, b) {
  const dLng = (b[1] - a[1]) * Math.PI / 180;
  const y = Math.sin(dLng) * Math.cos(b[0] * Math.PI / 180);
  const x = Math.cos(a[0]*Math.PI/180)*Math.sin(b[0]*Math.PI/180) - Math.sin(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.cos(dLng);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function clearRoute() {
  selectedTarget = null;
  if (destinationMarker) { map.removeLayer(destinationMarker); destinationMarker = null; }
  routeLayer.clearLayers();
  document.getElementById('route-info').classList.remove('visible');
  document.querySelectorAll('.position-item').forEach(el => el.classList.remove('selected'));
}

// ──────── SEARCH & LIST ────────
function renderPositionList(filter = '') {
  const container = document.getElementById('position-list');
  const f = filter.toLowerCase().trim();

  let grouped = {};
  CAT_ORDER.forEach(cat => { grouped[cat] = []; });

  POSITIONS.forEach(pos => {
    if (!grouped[pos.cat]) grouped[pos.cat] = [];
    if (!f || pos.id.toLowerCase().includes(f) || pos.desc.toLowerCase().includes(f) || pos.cat.includes(f)) {
      grouped[pos.cat].push(pos);
    }
  });

  let html = '';
  CAT_ORDER.forEach(cat => {
    const items = grouped[cat];
    if (items.length === 0) return;
    const ci = CAT_ICONS[cat];
    html += `<div style="padding:6px 10px 2px;font-size:0.7rem;font-weight:700;color:${ci.color};text-transform:uppercase;letter-spacing:0.5px">${ci.icon} ${ci.label} (${items.length})</div>`;
    items.forEach(pos => {
      html += `
        <div class="position-item" data-pos-id="${pos.id}" onclick="selectTarget('${pos.id}')">
          <div>
            <span class="pos-id">${pos.id}</span>
            <span class="pos-desc">${pos.desc}</span>
          </div>
          <span class="category-chip cat-${pos.cat}">${CAT_ICONS[pos.cat].label.split(' ')[0]}</span>
        </div>`;
    });
  });

  if (html === '') {
    html = '<div style="padding:20px;text-align:center;color:var(--text-secondary);font-size:0.85rem">Keine Positionen gefunden</div>';
  }

  container.innerHTML = html;
}

document.getElementById('search-box').addEventListener('input', function(e) {
  renderPositionList(e.target.value);
});

// ──────── BUTTONS ────────
document.getElementById('btn-center').addEventListener('click', () => {
  if (currentPosition) {
    map.setView([currentPosition.lat, currentPosition.lng], 16);
    showToast('📍 Auf Ihren Standort zentriert');
  } else {
    map.setView([50.040, 8.560], 13);
    showToast('⚠️ Kein GPS-Signal. Zeige Flughafen-Übersicht.');
  }
});

document.getElementById('btn-clear-route').addEventListener('click', clearRoute);

document.getElementById('btn-theme').addEventListener('click', () => {
  document.body.classList.toggle('light');
  const isLight = document.body.classList.contains('light');
  localStorage.setItem('fra_theme', isLight ? 'light' : 'dark');
});

// Demo mode: place user near mid-apron for training / offline use
let demoMode = false;
let demoTimer = null;
document.getElementById('btn-demo').addEventListener('click', () => {
  demoMode = !demoMode;
  const btn = document.getElementById('btn-demo');
  if (demoMode) {
    btn.classList.add('active');
    // Stop real GPS, simulate walking near V110
    if (gpsWatchId) {
      navigator.geolocation.clearWatch(gpsWatchId);
      gpsWatchId = null;
    }
    let t = 0;
    const baseLat = 50.04873, baseLng = 8.59126; // near V110 OSM
    function stepDemo() {
      t += 0.04;
      currentPosition = {
        lat: baseLat + Math.sin(t) * 0.00025,
        lng: baseLng + Math.cos(t) * 0.0004,
        accuracy: 5,
        heading: (Math.atan2(Math.cos(t), Math.sin(t)) * 180 / Math.PI + 360) % 360,
        speed: 1.5,
        timestamp: Date.now(),
      };
      gpsActive = true;
      updateGPSStatus('aktiv');
      updateGPSMarker();
      updateCoordsDisplay();
      if (destinationMarker) drawRoute();
    }
    stepDemo();
    demoTimer = setInterval(stepDemo, 1000);
    map.setView([baseLat, baseLng], 16);
    showToast('🎬 Demo-Modus aktiv – Bewegt sich am Nordvorfeld (V110 Bereich)');
  } else {
    btn.classList.remove('active');
    if (demoTimer) { clearInterval(demoTimer); demoTimer = null; }
    startGPS();
    showToast('📡 Demo beendet – echtes GPS reaktiviert');
  }
});

// ──────── MAP LAYER SWITCH (right-click or long press on map) ────────
let layerControl = L.control.layers(
  { 'OpenStreetMap': tileOSM, 'Satellit (ESRI)': tileSat, 'Dark Mode': tileDark },
  {},
  { position: 'topright', collapsed: true }
).addTo(map);

// ──────── TOAST ────────
function showToast(msg, type) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  if (type === 'error') toast.style.borderLeftColor = 'var(--danger)';
  toast.innerHTML = msg;
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.3s'; }, 2500);
  setTimeout(() => toast.remove(), 3000);
}

// ──────── INIT ────────
function init() {
  // Restore theme
  if (localStorage.getItem('fra_theme') === 'light') {
    document.body.classList.add('light');
  }

  renderPositionList();
  startGPS();

  // Welcome toast
  setTimeout(() => {
    showToast('👋 Willkommen! Route folgt Vorfeld-Servicewegen. GPS/Demo + Ziel wählen.');
  }, 1000);

  // Keyboard shortcut: Ctrl+F to focus search
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
      e.preventDefault();
      document.getElementById('search-box').focus();
    }
    if (e.key === 'Escape') {
      clearRoute();
      document.getElementById('search-box').blur();
    }
  });

  // Handle GPS reactivation after page visibility change
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && !gpsWatchId && !demoMode) {
      startGPS();
    }
  });
}

init();
</script>
</body>
</html>
