<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FRA Vorfeld Navigator</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.webmanifest">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    /* Leaflet override for dark theme */
    .leaflet-control-zoom a { background: #1e1e2f; color: #eee; }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="brand">
        <span class="badge">FRA</span>
        <span class="title">Vorfeld Navigator</span>
        <span class="sub">FRAPORT Ṗ EDDF</span>
      </div>
      <div class="header-controls">
        <span id="gps-status" class="gps-status"> Aus</span>
        <button id="btn-demo" class="icon-btn" title="Demo-Modus"></button>
        <button id="btn-settings" class="icon-btn" title="Einstellungen"></button>
        <button id="btn-center" class="icon-btn" title="Zentrieren"></button>
      </div>
    </header>

    <div id="map-container">
      <div id="map"></div>
    </div>

    <!-- Search bar -->
    <div id="search-panel">
      <input id="search-input" type="text" placeholder="Position, Gate oder Stand suchen " autocomplete="off">
      <div id="search-results" class="hidden"></div>
    </div>

    <!-- Info panel -->
    <div id="info-panel" class="hidden">
      <div id="route-info"></div>
      <button id="btn-clear-route">Route löschen</button>
    </div>

    <!-- Settings drawer -->
    <div id="settings-overlay" class="hidden">
      <div id="settings-drawer">
        <h2>Einstellungen</h2>
        <div class="setting-group">
          <label>Sprache</label>
          <select id="lang-select">
            <option value="de">Deutsch</option>
            <option value="en">English</option>
          </select>
        </div>
        <div class="setting-group">
          <label>Fahrzeugtyp</label>
          <select id="vehicle-select">
            <option value="pushback">Pushback</option>
            <option value="followme">Follow-me</option>
            <option value="gepäck">Gepäck</option>
            <option value="catering">Catering</option>
            <option value="tankwagen">Tankwagen</option>
          </select>
        </div>
        <div class="setting-group">
          <label>Kartenstil</label>
          <select id="basemap-select">
            <option value="osm">OpenStreetMap</option>
            <option value="sat">Satellit</option>
            <option value="dark">Dunkel</option>
          </select>
        </div>
        <div class="setting-group toggle-group">
          <label><input type="checkbox" id="check-zones" checked> Zonen anzeigen (Schengen, NonSchengen, )</label>
          <label><input type="checkbox" id="check-buildings" checked> Gebäude/GateLabels (ASO, BSO, )</label>
        </div>
        <button id="btn-close-settings">Schließen</button>
      </div>
    </div>

    <!-- Zoom controls (custom, north-up) -->
    <div id="custom-zoom">
      <button id="zoom-in" class="zoom-btn">+</button>
      <button id="zoom-out" class="zoom-btn"></button>
    </div>

    <div id="route-status" class="hidden"></div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Main app -->
  <script type="module" src="app.js"></script>
</body>
</html>
